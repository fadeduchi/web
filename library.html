<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>library</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#6f0000;
  font-family:'JetBrains Mono', monospace;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.noise::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.06;
  pointer-events:none;
}

.container{
  text-align:center;
}

.title{
  font-size:clamp(28px,4vw,48px);
  letter-spacing:3px;
  margin-bottom:40px;
  opacity:.8;
}

.clock{
  font-size:clamp(40px,8vw,110px);
  letter-spacing:4px;
  text-shadow:0 0 12px rgba(111,0,0,.35);
  animation:flicker 6s infinite;
}

.label{
  margin-top:20px;
  font-size:12px;
  opacity:.35;
  letter-spacing:2px;
}

@keyframes flicker{
  0%,100%{opacity:1}
  2%{opacity:.4}
  3%{opacity:1}
  50%{opacity:.85}
}
</style>
</head>

<body class="noise">

<div class="container">
  <div class="title">the library is watching</div>
  <div class="clock" id="clock">loading...</div>
  <div class="label">days : hours : minutes : seconds</div>
</div>

<script>
// ✅ persistent real countdown
const TEN_DAYS_MS = 10 * 24 * 60 * 60 * 1000;
const STORAGE_KEY = "libraryCountdownTarget";

let target = localStorage.getItem(STORAGE_KEY);

// if first visit → set real fixed target
if (!target) {
  target = Date.now() + TEN_DAYS_MS;
  localStorage.setItem(STORAGE_KEY, target);
} else {
  target = parseInt(target, 10);
}

function updateCountdown(){
  const now = Date.now();
  let diff = target - now;

  if(diff < 0) diff = 0;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  const pad = n => String(n).padStart(2,'0');

  document.getElementById('clock').textContent =
    `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
