<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emiliano System</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;font-family:Consolas,monospace;color:#ddd}
.container{display:flex;gap:12px;padding:12px}
.window{width:50%;background:#0b0b0b;border:1px solid #222;border-radius:6px;overflow:hidden}
.titlebar{background:#0f0f0f;padding:6px 10px;font-size:12px;color:#888;border-bottom:1px solid #222}
.terminal{height:280px;overflow-y:auto;padding:12px;font-size:13px;scroll-behavior:smooth}
.line{margin:2px 0;opacity:0;animation:fadeIn .2s forwards}
@keyframes fadeIn{to{opacity:1}}
.green{color:#00ff99}.red{color:#ff4d4d}.gray{color:#777}
.controls{padding:12px;border-top:1px solid #111}
input{width:100%;padding:8px;margin-bottom:6px;background:#000;border:1px solid #222;color:#fff}
button{width:100%;padding:9px;background:#111;color:#fff;border:1px solid #222;cursor:pointer}
button:hover{background:#fff;color:#000}
.options{font-size:12px;margin-bottom:6px}
.options label{display:block;opacity:0.6;cursor:pointer}
.options input{width:auto;margin-right:5px}
.toggle{font-size:12px;margin-top:6px;opacity:0.5;cursor:pointer}
.comboBox{display:none;margin-top:5px}
</style>
</head>
<body>

<div class="container">

<div class="window">
  <div class="titlebar">C:\\generator.exe</div>
  <div class="terminal" id="genTerm"></div>
  <div class="controls">
    <input id="genAmount" placeholder="amount">
    <input id="genLength" placeholder="length">

    <div class="options">
      <label><input type="checkbox" id="optWords" onclick="toggleWordOptions()"> english words</label>
      <div class="comboBox" id="comboBox">
        <label><input type="checkbox" id="optCombo"> word combos</label>
      </div>
      <label><input type="checkbox" id="optNumbers"> numbers</label>
      <label><input type="checkbox" id="optUnderscore"> underscore</label>
      <label><input type="checkbox" id="optLeet"> leetspeak</label>
    </div>

    <button onclick="runGen()">run</button>
    <div class="toggle" onclick="toggleFarm()">auto farm: OFF</div>
  </div>
</div>

<div class="window">
  <div class="titlebar">C:\\checker.exe</div>
  <div class="terminal" id="checkTerm"></div>
  <div class="controls">
    <input id="checkList" placeholder="user1,user2">
    <button onclick="runCheck()">check</button>
    <button onclick="downloadValid()">save valid</button>
  </div>
</div>

</div>

<script>
let wordList = [];
let wordReady = false;

async function loadWordList(){
  if(wordReady) return;
  try{
    const res = await fetch("https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt");
    const text = await res.text();
    wordList = text.split("\n")
      .map(w=>w.trim())
      .filter(w=>w.length>=3 && w.length<=6);
    wordReady = true;
  }catch{
    wordList = ["zen","void","nova","luxe","flux","rift"];
    wordReady = true;
  }
}

let validUsers = JSON.parse(localStorage.getItem("validUsers")||"[]");
let autoFarm=false;
let farmInterval;

function save(){
  localStorage.setItem("validUsers",JSON.stringify(validUsers));
}

function log(term,text,cls=""){
  const el=document.getElementById(term);
  const div=document.createElement("div");
  div.className="line "+cls;
  div.textContent=text;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

function toggleWordOptions(){
  document.getElementById("comboBox").style.display =
    document.getElementById("optWords").checked ? "block" : "none";
}

function applyLeet(str){
  const map={a:'4',e:'3',i:'1',o:'0',s:'5'};
  return str.split('').map(c=>map[c]||c).join('');
}

async function fetchWord(){
  try{
    if(!wordReady) await loadWordList();
    return wordList[Math.floor(Math.random()*wordList.length)];
  }catch{
    return "nova";
  }
}

async function buildName(len){
  if(document.getElementById("optWords").checked){
    let w1 = (await fetchWord()).replace(/[^a-z]/g,"");

    if(document.getElementById("optCombo").checked){
      let w2 = (await fetchWord()).replace(/[^a-z]/g,"");
      w1 = w1 + w2;
    }

    if(w1.length>6) w1=w1.slice(0,6);
    if(document.getElementById("optNumbers").checked) w1+=Math.floor(Math.random()*100);
    if(document.getElementById("optUnderscore").checked) w1="_"+w1;
    if(document.getElementById("optLeet").checked) w1=applyLeet(w1);

    return w1;
  }

  let chars="abcdefghijklmnopqrstuvwxyz";
  if(document.getElementById("optNumbers").checked) chars+="0123456789";
  if(document.getElementById("optUnderscore").checked) chars+="_";

  let name = Array.from({length:len},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  if(name.length<=5) name=name.replace(/(.)\1+/g,"$1");
  if(document.getElementById("optLeet").checked) name=applyLeet(name);

  return name;
}

async function robloxCheck(username){
  try{
    const res = await fetch("/api/check", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username })
    });

    const data = await res.json();
    return data.available ? 0 : 1;

  }catch{
    throw new Error("fail");
  }
}

async function runGen(){
  const amount=parseInt(document.getElementById("genAmount").value)||10;
  const length=parseInt(document.getElementById("genLength").value)||5;

  const list=[];
  for(let i=0;i<amount;i++){
    const user=await buildName(length);
    list.push(user);
    log("genTerm",user);
  }

  document.getElementById("checkList").value=list.join(",");
  log("genTerm","done","gray");
}

function toggleFarm(){
  autoFarm=!autoFarm;
  const el=document.querySelector(".toggle");

  if(autoFarm){
    el.textContent="auto farm: ON";
    farmInterval=setInterval(async()=>{
      const user=await buildName(5);
      log("genTerm",user);
      document.getElementById("checkList").value+=","+user;
    },400);
  }else{
    el.textContent="auto farm: OFF";
    clearInterval(farmInterval);
  }
}

async function runCheck(){
  const list=document.getElementById("checkList").value.split(",");

  for (let user of list){
    user=user.trim();
    if(!user) continue;

    log("checkTerm",`checking ${user}...`,`gray`);

    try{
      const res=await robloxCheck(user);

      if(res===0){
        validUsers.push(user);
        log("checkTerm",`[+] ${user}`,"green");
      }else{
        log("checkTerm",`[-] ${user}`,"red");
      }

    }catch{
      log("checkTerm","error","red");
    }

    await new Promise(r=>setTimeout(r,200));
  }

  save();
}

function downloadValid(){
  const blob=new Blob([validUsers.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="valid.txt";
  a.click();
}

window.onload=()=>{
  validUsers.forEach(u=>log("checkTerm","[saved] "+u,"green"));
}
</script>

</body>
</html>
