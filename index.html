<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flesh checker</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;font-family:Consolas,monospace;color:#ddd}
.container{display:flex;gap:12px;padding:12px;flex-wrap:wrap}

.window{width:49%;background:#0b0b0b;border:1px solid #222;border-radius:6px;overflow:hidden}
.full{width:100%}

.titlebar{background:#0f0f0f;padding:6px 10px;font-size:12px;color:#888;border-bottom:1px solid #222}
.terminal{height:260px;overflow-y:auto;padding:12px;font-size:13px}

.line{margin:2px 0;opacity:0;transform:translateY(6px);animation:smoothIn .25s ease forwards}
@keyframes smoothIn{to{opacity:1;transform:translateY(0)}}

.green{color:#00ff99}
.red{color:#ff4d4d}
.gray{color:#777}
.gold{color:#ffd700;text-shadow:0 0 6px #ffd700}

/* 🔥 INPUT PRO */
input{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  background:#050505;
  border:1px solid #222;
  color:#00ff99;
  outline:none;
  transition:.2s;
}
input:focus{
  border:1px solid #00ff99;
  box-shadow:0 0 6px #00ff99;
}

/* 🔥 TOGGLE */
.switch{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:6px 0;
  font-size:12px;
}
.switch input{display:none}

.slider{
  width:32px;height:16px;
  background:#222;
  border-radius:20px;
  position:relative;
  cursor:pointer;
  transition:.2s;
}
.slider::before{
  content:"";
  position:absolute;
  width:12px;height:12px;
  background:#777;
  border-radius:50%;
  top:2px;left:2px;
  transition:.2s;
}
.switch input:checked + .slider{
  background:#00ff99;
}
.switch input:checked + .slider::before{
  transform:translateX(16px);
  background:#000;
}

.controls{padding:12px;border-top:1px solid #111}

button{
  width:100%;
  padding:9px;
  background:#111;
  color:#fff;
  border:1px solid #222;
  cursor:pointer;
}
button:hover{
  background:#fff;
  color:#000;
}

.stats{
  font-size:12px;
  padding:6px;
  background:#050505;
  color:#00ff99
}
</style>
</head>

<body>

<div class="container">

<!-- GENERATOR -->
<div class="window">
<div class="titlebar">C:\\generator.exe</div>
<div class="terminal" id="genTerm"></div>

<div class="controls">
<input id="genAmount" placeholder="amount">
<input id="genLength" placeholder="length">

<label class="switch">numbers
<input type="checkbox" id="optNumbers">
<span class="slider"></span>
</label>

<label class="switch">underscore
<input type="checkbox" id="optUnd">
<span class="slider"></span>
</label>

<label class="switch">leetspeak
<input type="checkbox" id="optLeet">
<span class="slider"></span>
</label>

<button onclick="runGen()">run</button>
</div>
</div>

<!-- CHECKER -->
<div class="window">
<div class="titlebar">C:\\checker.exe</div>
<div class="terminal" id="checkTerm"></div>

<div class="stats" id="statsBar">
hits: 0 | fails: 0 | rate: 0%
</div>

<div class="controls">
<input id="checkList" placeholder="user1,user2">

<label class="switch">only OG
<input type="checkbox" id="filterOG">
<span class="slider"></span>
</label>

<label class="switch">no numbers
<input type="checkbox" id="filterNoNum">
<span class="slider"></span>
</label>

<label class="switch">no underscore
<input type="checkbox" id="filterNoUnd">
<span class="slider"></span>
</label>

<button id="checkBtn" onclick="runCheck()">check</button>
<button onclick="stopCheck()">stop</button>
<button onclick="downloadValid()">save valid</button>
</div>
</div>

<!-- TOP -->
<div class="window full">
<div class="titlebar">C:\\top10.exe</div>
<div class="terminal" id="topTerm"></div>
</div>

<!-- LOOKUP -->
<div class="window full">
<div class="titlebar">C:\\lookup.exe</div>

<div class="controls">
<input id="lookupInput" placeholder="username">
<button onclick="lookupUser()">lookup</button>
</div>

<div class="terminal" id="lookupTerm"></div>
</div>

</div>

<script>
let hits=0,fails=0,checking=false,stopRequested=false;
let validUsers=[],topUsers=[];

// LOG
function log(term,text,cls=""){
  const el=document.getElementById(term);
  const div=document.createElement("div");
  div.className="line "+cls;
  div.textContent=text;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

// GENERATOR
function applyLeet(str){
  return str.replace(/a/g,"4").replace(/e/g,"3").replace(/o/g,"0");
}

function randomName(len){
  let chars="abcdefghijklmnopqrstuvwxyz";
  if(optNumbers.checked) chars+="0123456789";
  if(optUnd.checked) chars+="_";

  let name="";
  for(let i=0;i<len;i++){
    name+=chars[Math.floor(Math.random()*chars.length)];
  }

  if(optLeet.checked) name=applyLeet(name);
  return name;
}

async function runGen(){
  genTerm.innerHTML="";
  let amount=parseInt(genAmount.value)||10;
  let len=parseInt(genLength.value)||5;

  let list=[];
  for(let i=0;i<amount;i++){
    let u=randomName(len);
    list.push(u);
    log("genTerm",u);
    await new Promise(r=>setTimeout(r,40));
  }

  checkList.value=list.join(",");
}

// SCORE
function scoreUser(u){
  let s=0;
  if(u.length<=3)s+=5;
  else if(u.length==4)s+=4;
  else if(u.length==5)s+=3;
  if(!/[0-9]/.test(u))s++;
  if(!u.includes("_"))s++;
  return s;
}

// TOP
function updateTop(user){
  topUsers.push(user);
  topUsers.sort((a,b)=>scoreUser(b)-scoreUser(a));
  topUsers=topUsers.slice(0,10);

  topTerm.innerHTML="";
  topUsers.forEach(u=>{
    const div=document.createElement("div");
    div.className="line gold";
    div.textContent=u;
    topTerm.appendChild(div);
  });
}

// FILTER
function passFilters(u){
  if(filterOG.checked && (u.length>5 || /[0-9_]/.test(u))) return false;
  if(filterNoNum.checked && /[0-9]/.test(u)) return false;
  if(filterNoUnd.checked && u.includes("_")) return false;
  return true;
}

// API CHECK
async function robloxCheck(u){
  const res=await fetch("/api/check",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u})
  });
  const data=await res.json();
  return data.available?0:1;
}

// CHECKER
function stopCheck(){ stopRequested=true; }

async function runCheck(){
  if(checking) return;
  checking=true; stopRequested=false; checkBtn.disabled=true;

  let list=checkList.value.split(",");

  for(let user of list){
    if(stopRequested) break;

    user=user.trim();
    if(!user||!passFilters(user)) continue;

    log("checkTerm",`checking ${user}...`,"gray");

    try{
      let res=await robloxCheck(user);

      if(res===0){
        hits++; validUsers.push(user); updateTop(user);

        let score=scoreUser(user);
        let div=document.createElement("div");
        div.className="line "+(score>=6?"gold":"green");

        let link=document.createElement("span");
        link.textContent=`[${"★".repeat(score)}] ${user}`;
        link.style.cursor="pointer";
        link.onclick=()=>window.open(`https://www.roblox.com/signup?username=${user}`);

        div.appendChild(link);
        checkTerm.appendChild(div);

      }else{
        fails++;
        log("checkTerm",`[-] ${user}`,"red");
      }

    }catch{
      fails++;
      log("checkTerm","error","red");
    }

    let total=hits+fails;
    statsBar.textContent=`hits: ${hits} | fails: ${fails} | rate: ${total?((hits/total)*100).toFixed(1):0}%`;

    await new Promise(r=>setTimeout(r,200));
  }

  checking=false;
  checkBtn.disabled=false;
}

// 🔥 LOOKUP FIX REAL
async function lookupUser(){
  let u=lookupInput.value.trim().toLowerCase();
  if(!u) return;

  lookupTerm.innerHTML="";
  log("lookupTerm","loading...","gray");

  try{
    let res = await fetch(`https://api.roblox.com/users/get-by-username?username=${u}`);
    let data = await res.json();

    if(!data || !data.Id){
      log("lookupTerm","not found","red");
      return;
    }

    let id=data.Id;

    let thumb = await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`)
      .then(r=>r.json());

    let img = thumb.data?.[0]?.imageUrl;

    let box=document.createElement("div");

    if(img){
      let image=document.createElement("img");
      image.src=img;
      image.style.width="60px";
      image.style.border="1px solid #222";
      image.style.marginBottom="8px";
      box.appendChild(image);
    }

    box.innerHTML += `
      <div>username: ${u}</div>
      <div>id: ${id}</div>
    `;

    let roblox=document.createElement("a");
    roblox.href=`https://www.roblox.com/users/${id}/profile`;
    roblox.textContent="open roblox";
    roblox.target="_blank";
    roblox.style.color="#00ff99";
    roblox.style.display="block";

    let roli=document.createElement("a");
    roli.href=`https://www.rolimons.com/player/${id}`;
    roli.textContent="open rolimons";
    roli.target="_blank";
    roli.style.color="#ffd700";
    roli.style.display="block";

    box.appendChild(roblox);
    box.appendChild(roli);

    lookupTerm.appendChild(box);

  }catch{
    log("lookupTerm","api blocked / error","red");
  }
}

// SAVE
function downloadValid(){
  const blob=new Blob([validUsers.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="valid.txt";
  a.click();
}
</script>

</body>
</html>
